server.port=${SERVER_PORT:9000}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/institutional_data_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=DEBUG

# Writable uploads (default: <cwd>/app-uploads). Faculty photos: .../faculty_profile_pictures/
# app.storage.root=

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=${JWT_SECRET:DAFASFASDAADSCSDFADCVSGCFVADXCcadwavfsfarvfDAFASFASDAADSCSDFADCVSGCFVADXCcadDAFASFASDAADSCSDFADCVSGCFVADXCcad}
jwt.expiration=${JWT_EXPIRATION:3600}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,https://institutional-data-center.vercel.app}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
