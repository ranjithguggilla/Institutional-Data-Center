services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Admin@123}
      MYSQL_DATABASE: institutional_data_center
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "9000:9000"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/institutional_data_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimeZone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Admin@123}
      JWT_SECRET: ${JWT_SECRET:-DAFASFASDAADSCSDFADCVSGCFVADXCcadwavfsfarvfDAFASFASDAADSCSDFADCVSGCFVADXCcadDAFASFASDAADSCSDFADCVSGCFVADXCcad}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
